<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYME — Automation & You Mastery Engine</title>
<style>
:root {
  --bg: #0b1020;
  --bg-2: #121935;
  --panel: #161f3d;
  --panel-2: #1c2850;
  --border: #263064;
  --text: #e8ecff;
  --muted: #9aa3c7;
  --primary: #6c8cff;
  --primary-2: #8aa4ff;
  --accent: #22d3c8;
  --accent-2: #7cf0e5;
  --warn: #f5b041;
  --danger: #ff6b8a;
  --success: #34d399;
  --shadow: 0 10px 30px rgba(0,0,0,0.35);
  --radius: 14px;
}
[data-theme="light"] {
  --bg: #f4f6ff;
  --bg-2: #ffffff;
  --panel: #ffffff;
  --panel-2: #f0f3ff;
  --border: #d9deff;
  --text: #0c1430;
  --muted: #596085;
  --primary: #3558ff;
  --primary-2: #6c8cff;
  --accent: #0ea5a0;
  --accent-2: #22d3c8;
  --shadow: 0 10px 24px rgba(30, 50, 130, 0.08);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(1200px 600px at 10% -10%, rgba(108,140,255,0.25), transparent 50%),
              radial-gradient(1000px 500px at 110% 110%, rgba(34,211,200,0.18), transparent 50%),
              var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
a { color: var(--primary-2); text-decoration: none; }
button { font-family: inherit; }
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

/* Sidebar */
.sidebar {
  background: linear-gradient(180deg, var(--bg-2), var(--panel));
  border-right: 1px solid var(--border);
  padding: 20px 14px;
  position: sticky; top: 0; height: 100vh;
}
.brand { display:flex; align-items:center; gap:10px; margin-bottom: 24px; }
.brand-logo {
  width: 38px; height: 38px; border-radius: 10px;
  background: conic-gradient(from 210deg, var(--primary), var(--accent), var(--primary));
  display:grid; place-items:center; color: #0b1020; font-weight: 900;
  box-shadow: var(--shadow);
  font-size: 14px;
}
.brand-name { font-weight: 800; letter-spacing: 0.5px; }
.brand-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.nav { display: flex; flex-direction: column; gap: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 10px; cursor: pointer;
  color: var(--text); font-size: 14px; opacity: 0.85;
  border: 1px solid transparent;
  user-select: none;
}
.nav-item:hover { background: var(--panel-2); opacity: 1; }
.nav-item.active {
  background: linear-gradient(90deg, rgba(108,140,255,0.18), rgba(34,211,200,0.10));
  border-color: var(--border);
  opacity: 1;
}
.nav-item .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
}
.sidebar-footer { position: absolute; bottom: 16px; left: 14px; right: 14px; font-size: 12px; color: var(--muted);}
.theme-toggle {
  display: inline-flex; align-items:center; gap: 6px; padding: 6px 10px;
  background: var(--panel-2); border:1px solid var(--border); border-radius: 8px;
  cursor: pointer; color: var(--text); font-size: 12px;
}

/* Main */
.main { padding: 26px 30px 60px; max-width: 1200px; width: 100%; }
.topbar { display:flex; align-items:center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;}
.stats { display:flex; gap: 10px; flex-wrap: wrap; }
.stat {
  background: var(--panel); border: 1px solid var(--border); padding: 10px 14px;
  border-radius: 12px; font-size: 12px; color: var(--muted); display:flex; align-items:center; gap: 8px;
}
.stat b { color: var(--text); font-size: 14px; }
.xp-wrap { flex: 1; min-width: 260px; }
.xp-bar { height: 10px; background: var(--panel-2); border-radius: 999px; overflow: hidden; border:1px solid var(--border); }
.xp-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); transition: width 0.6s ease; }
.xp-meta { display:flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; }

/* Typography */
h1 { font-size: 28px; margin: 0 0 4px; }
h2 { font-size: 20px; margin: 0 0 12px; }
h3 { font-size: 16px; margin: 0 0 8px; }
.subtitle { color: var(--muted); margin-bottom: 18px; }
.pill {
  display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px;
  background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
  margin-right: 6px;
}
.pill.good { color: var(--success); border-color: rgba(52,211,153,0.35); background: rgba(52,211,153,0.08); }
.pill.warn { color: var(--warn); border-color: rgba(245,176,65,0.35); background: rgba(245,176,65,0.08); }
.pill.hot  { color: var(--danger); border-color: rgba(255,107,138,0.35); background: rgba(255,107,138,0.08); }

/* Cards */
.grid { display: grid; gap: 16px; }
.grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
.grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.card {
  background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; box-shadow: var(--shadow);
  transition: transform 0.12s ease, border-color 0.12s ease;
}
.card:hover { transform: translateY(-2px); border-color: rgba(108,140,255,0.45); }
.card .icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(108,140,255,0.25), rgba(34,211,200,0.18));
  display:grid; place-items:center; font-size: 20px; margin-bottom: 10px;
  border: 1px solid var(--border);
}
.muted { color: var(--muted); }
.tiny { font-size: 12px; }
.row { display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
.spacer { flex: 1; }
.progress {
  height: 8px; background: var(--panel-2); border-radius: 999px; overflow:hidden;
  border:1px solid var(--border); margin-top: 10px;
}
.progress > span { display:block; height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent));}
.btn {
  display:inline-flex; align-items:center; gap: 6px;
  padding: 9px 14px; border-radius: 10px; cursor: pointer; font-weight: 600;
  background: var(--panel-2); border:1px solid var(--border); color: var(--text); font-size: 13px;
}
.btn:hover { border-color: var(--primary); }
.btn.primary {
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border: none; color: #0b1020;
}
.btn.ghost { background: transparent; }
.btn.small { padding: 6px 10px; font-size: 12px; }
.btn.danger { border-color: rgba(255,107,138,0.35); color: var(--danger); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Tabs */
.tabs { display:flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.tab {
  padding: 8px 14px; border-radius: 999px; background: var(--panel); border:1px solid var(--border);
  cursor: pointer; font-size: 13px; color: var(--muted);
}
.tab.active { background: linear-gradient(90deg, rgba(108,140,255,0.22), rgba(34,211,200,0.14)); color: var(--text); border-color: var(--primary);}

/* Module list */
.module-card h3 { display: flex; align-items:center; gap: 8px; }
.module-card .meta { display:flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;}

/* Tier sections */
.tier { margin-top: 26px; }
.tier:first-of-type { margin-top: 18px; }
.tier-head { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
.tier-head h2 { margin: 0; }
.tier-blurb { color: var(--muted); font-size: 14px; margin: 0 0 14px; line-height: 1.5; }
.tier-status {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 999px;
}
.tier-status-open {
  background: rgba(34, 211, 200, 0.14);
  color: var(--accent);
  border: 1px solid rgba(34, 211, 200, 0.4);
}
.tier-status-locked {
  background: rgba(154, 163, 199, 0.12);
  color: var(--muted);
  border: 1px solid var(--border);
  text-transform: none;
  letter-spacing: normal;
  font-weight: 500;
}
.tier-locked .tier-grid { opacity: 0.72; }
.card-locked { position: relative; }
.card-locked::after {
  content: "🔒";
  position: absolute;
  top: 12px; right: 14px;
  font-size: 16px;
  opacity: 0.55;
  pointer-events: none;
}

/* Beginner dashboard hero */
.dash-hero {
  text-align: center;
  padding: 32px 28px;
  background: linear-gradient(135deg, rgba(108,140,255,0.12), rgba(34,211,200,0.12));
  border: 1px solid var(--primary);
}
.dash-hero-kicker {
  text-transform: uppercase;
  letter-spacing: 1px;
  font-size: 11px;
  color: var(--accent);
  font-weight: 700;
  margin-bottom: 8px;
}
.dash-hero h2 { margin: 6px 0 0; font-size: 26px; }
.btn.large { font-size: 15px; padding: 12px 22px; }
.dash-howto { background: var(--panel-2); }
.dash-howto h3 { margin-top: 0; }

/* First-run welcome overlay */
#welcome {
  display: none;
  position: fixed; inset: 0; z-index: 9000;
  background: rgba(11, 16, 32, 0.82);
  backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
  padding: 24px;
}
body[data-welcome="on"] #welcome { display: flex; }
.welcome-card {
  width: 100%; max-width: 560px;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}
.welcome-step { animation: welcome-fade 0.25s ease; }
@keyframes welcome-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.welcome-step h1 { margin: 0 0 8px; font-size: 24px; line-height: 1.25; }
.welcome-step p { color: var(--muted); line-height: 1.55; margin: 0 0 14px; }
.welcome-how { margin: 18px 0 10px; display: flex; flex-direction: column; gap: 10px; }
.welcome-how li { list-style: none; display: flex; gap: 12px; align-items: flex-start; font-size: 14px; color: var(--text); line-height: 1.5; }
.welcome-how li .wh-icon { flex: 0 0 28px; height: 28px; display: grid; place-items: center; border-radius: 8px; background: rgba(108,140,255,0.16); font-size: 15px; }
.welcome-dots { display: flex; gap: 8px; margin-top: 22px; justify-content: center; }
.welcome-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.welcome-dot.active { background: var(--primary); }
.welcome-actions { display: flex; gap: 10px; margin-top: 18px; justify-content: space-between; align-items: center; }
.welcome-skip { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; text-decoration: underline; }
.welcome-btn {
  padding: 11px 20px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--panel-2); color: var(--text); font-weight: 600; cursor: pointer;
  font-size: 14px;
}
.welcome-btn.primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #0b1020; border-color: transparent;
}
.welcome-btn:hover { filter: brightness(1.08); }
.welcome-modules { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 16px 0 4px; }
.welcome-mod {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.12s ease, transform 0.08s ease;
}
.welcome-mod:hover { border-color: var(--primary); transform: translateY(-1px); }
.welcome-mod.selected { border-color: var(--accent); background: rgba(34,211,200,0.08); }
.welcome-mod .wm-icon { font-size: 22px; }
.welcome-mod .wm-name { font-weight: 600; margin-top: 4px; font-size: 14px; }
.welcome-mod .wm-tag { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.4; }
@media (max-width: 520px) {
  .welcome-modules { grid-template-columns: 1fr; }
}
.kv { display:grid; grid-template-columns: 140px 1fr; gap: 6px 12px; font-size: 13px; }
.kv div:nth-child(odd) { color: var(--muted); }

/* Flashcards */
.flashcard {
  perspective: 1200px; width: 100%; max-width: 520px; margin: 0 auto;
}
.flashcard .inner {
  position: relative; width: 100%; min-height: 220px; transform-style: preserve-3d;
  transition: transform 0.6s; cursor: pointer;
}
.flashcard.flipped .inner { transform: rotateY(180deg); }
.flashcard .face {
  position: absolute; inset: 0; backface-visibility: hidden;
  background: var(--panel); border:1px solid var(--border); border-radius: var(--radius);
  padding: 26px; display:grid; place-items:center; text-align: center;
  box-shadow: var(--shadow);
}
.flashcard .back { transform: rotateY(180deg); background: linear-gradient(160deg, var(--panel), var(--panel-2)); }
.flashcard .term { font-size: 22px; font-weight: 700; }
.flashcard .hint { color: var(--muted); font-size: 12px; margin-top: 8px; }
.flashcard .def { font-size: 15px; line-height: 1.5; }

/* Quiz */
.quiz-option {
  padding: 12px 14px; border-radius: 10px; background: var(--panel-2);
  border: 1px solid var(--border); margin-bottom: 8px; cursor: pointer; display:flex; gap:10px; align-items:center;
}
.quiz-option:hover { border-color: var(--primary); }
.quiz-option .badge {
  width: 22px; height: 22px; border-radius: 50%; display:grid; place-items:center;
  border: 1px solid var(--border); font-size: 11px;
}
.quiz-option.correct { border-color: var(--success); background: rgba(52,211,153,0.12); }
.quiz-option.wrong { border-color: var(--danger); background: rgba(255,107,138,0.12); }
.quiz-option.chosen { outline: 2px solid var(--primary); }

/* Matching game */
.match-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.match-item {
  padding: 12px; background: var(--panel-2); border:1px solid var(--border); border-radius: 10px;
  cursor: pointer; min-height: 56px; display:flex; align-items:center; font-size: 13px;
}
.match-item.selected { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(108,140,255,0.3); }
.match-item.matched { opacity: 0.35; pointer-events: none; text-decoration: line-through; }
.match-item.wrong { animation: shake 0.4s; border-color: var(--danger); }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* Pyramid game */
.pyramid { display:flex; flex-direction:column; gap: 6px; align-items:center; margin-top: 12px;}
.pyramid-slot {
  border: 2px dashed var(--border); border-radius: 10px; padding: 12px 18px;
  min-width: 260px; text-align: center; color: var(--muted);
  background: rgba(255,255,255,0.02);
}
.pyramid-slot.filled { border-style: solid; color: var(--text); background: var(--panel-2); }
.pyramid-slot[data-level="4"] { width: 30%; }
.pyramid-slot[data-level="3"] { width: 45%; }
.pyramid-slot[data-level="2"] { width: 60%; }
.pyramid-slot[data-level="1"] { width: 75%; }
.pyramid-slot[data-level="0"] { width: 90%; }
.pieces { display:flex; flex-wrap:wrap; gap: 8px; margin-top: 16px; justify-content: center;}
.piece {
  padding: 8px 14px; background: var(--panel); border: 1px solid var(--primary); border-radius: 999px;
  cursor: grab; user-select:none; font-size: 13px;
}
.piece.used { opacity: 0.3; pointer-events: none; }

/* Search input */
.search {
  padding: 10px 14px; background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); width: 100%; font-size: 14px; outline: none;
}
.search:focus { border-color: var(--primary); }

/* Badges */
.badges { display:flex; gap: 8px; flex-wrap: wrap; }
.badge-chip {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 999px;
  background: var(--panel-2); display:flex; align-items:center; gap: 6px; font-size: 12px;
}
.badge-chip.locked { opacity: 0.35; filter: grayscale(60%); }

/* Toast */
.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 12px 16px;
  background: var(--panel); border:1px solid var(--border); border-radius: 10px;
  box-shadow: var(--shadow); z-index: 9999; max-width: 320px;
  animation: slideIn 0.25s ease; font-size: 13px;
}
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Mobile */
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .main { padding: 18px; }
}
details { background: var(--panel-2); border:1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;}
summary { cursor: pointer; font-weight: 600; }
details[open] { background: var(--panel); }
hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
code {
  background: var(--panel-2); padding: 2px 6px; border-radius: 6px; font-size: 12px;
  border: 1px solid var(--border);
}
ul.tight li { margin-bottom: 4px; }
.ring {
  --p: 0; width: 86px; height: 86px; border-radius: 50%;
  background: conic-gradient(var(--primary) calc(var(--p)*1%), var(--panel-2) 0);
  display:grid; place-items:center; position: relative;
}
.ring::after {
  content: ""; position: absolute; inset: 8px; border-radius: 50%; background: var(--panel);
}
.ring > span { position: relative; z-index: 1; font-weight: 700; }

/* Hover explanations — simple jargon busters */
.tip {
  border-bottom: 1px dotted var(--primary-2);
  cursor: help;
  position: relative;
  transition: background 0.15s ease;
  padding: 0 2px;
  border-radius: 3px;
}
.tip:hover, .tip:focus { background: rgba(108,140,255,0.12); outline: none; }
.tip::after {
  content: attr(data-tip);
  position: absolute;
  left: 50%;
  bottom: calc(100% + 10px);
  transform: translateX(-50%) translateY(4px);
  width: max-content;
  max-width: 300px;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--primary);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 12.5px;
  line-height: 1.5;
  font-weight: 400;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  white-space: normal;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
  z-index: 10000;
  text-align: left;
  letter-spacing: normal;
  text-transform: none;
}
.tip::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: calc(100% + 4px);
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: var(--primary);
  opacity: 0;
  transition: opacity 0.18s ease;
  pointer-events: none;
  z-index: 10000;
}
.tip:hover::after, .tip:hover::before,
.tip:focus::after, .tip:focus::before,
.tip.tip-show::after, .tip.tip-show::before {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.tip.tip-flip::after { bottom: auto; top: calc(100% + 10px); }
.tip.tip-flip::before {
  bottom: auto; top: calc(100% + 4px);
  border-top-color: transparent; border-bottom-color: var(--primary);
}
@media (max-width: 600px) {
  .tip::after { max-width: 240px; font-size: 12px; }
}

/* Auth gate — landing + paywall */
.app { display: none; }
body[data-auth="ready"] .app { display: grid; }
#gate { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
body[data-auth="gate"] #gate { display: flex; }
.gate-card {
  width: 100%; max-width: 520px;
  background: linear-gradient(180deg, var(--panel), var(--panel-2));
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.45);
  text-align: center;
}
.gate-brand { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 18px; }
.gate-logo {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  display: grid; place-items: center; font-weight: 800; color: #0b1020; font-size: 16px;
}
.gate-name { font-weight: 800; font-size: 20px; letter-spacing: 0.3px; }
.gate-sub { color: var(--muted); font-size: 13px; }
.gate-card h1 { margin: 8px 0 8px; font-size: 26px; line-height: 1.25; }
.gate-card p { color: var(--muted); line-height: 1.55; margin: 0 0 20px; }
.gate-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
.gate-btn {
  padding: 12px 18px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--panel-2); color: var(--text); font-weight: 600; cursor: pointer;
  font-size: 15px; transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
}
.gate-btn:hover { background: var(--panel); border-color: var(--primary); }
.gate-btn.primary {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  color: #0b1020; border-color: transparent;
}
.gate-btn.primary:hover { transform: translateY(-1px); filter: brightness(1.05); }
.gate-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.gate-features { text-align: left; margin: 18px 0 6px; color: var(--text); font-size: 14px; line-height: 1.8; }

<script>
/* ============================================================
   AYME — auth gate (Clerk + Stripe)
   ============================================================ */

const GATE = {
  clerk: null,
  ready: false,
  state: 'loading', // loading | landing | paywall | ready | error
  async init() {
    this.el = document.getElementById('gateCard');
    try {
      await this.waitForClerk();
      this.clerk = window.Clerk;
      await this.clerk.load({ afterSignOutUrl: '/' });
      this.clerk.addListener(({ user }) => this.render(user));
      this.render(this.clerk.user);
      this.handleCheckoutReturn();
    } catch (err) {
      console.error('Gate init failed', err);
      this.renderError(err);
    }
  },
  waitForClerk() {
    return new Promise((resolve, reject) => {
      const start = Date.now();
      const tick = () => {
        if (window.Clerk) return resolve();
        if (Date.now() - start > 15000) return reject(new Error('Clerk failed to load'));
        setTimeout(tick, 100);
      };
      tick();
    });
  },
  render(user) {
    if (!user) {
      document.body.setAttribute('data-auth', 'gate');
      this.state = 'landing';
      this.renderLanding();
      return;
    }
    const status = user.publicMetadata?.subscriptionStatus;
    if (status === 'active') {
      document.body.setAttribute('data-auth', 'ready');
      this.state = 'ready';
      if (window.onAymeAuthReady && !this.booted) {
        this.booted = true;
        try { window.onAymeAuthReady(user); } catch(e) { console.warn(e); }
      }
    } else {
      document.body.setAttribute('data-auth', 'gate');
      this.state = 'paywall';
      this.renderPaywall(user);
    }
  },
  renderLanding() {
    this.el.innerHTML = `
      <div class="gate-brand">
        <div class="gate-logo">AY</div>
        <div style="text-align:left">
          <div class="gate-name">AYME</div>
          <div class="gate-sub">Automation & You Mastery Engine</div>
        </div>
      </div>
      <h1>Master connected automation in pharma &amp; biotech</h1>
      <p>The learning platform for key account managers, sales engineers, and consultants working in pharma &amp; biotech automation. DeltaV, MES, CSV, IT/OT, Syncade, PAS-X — made simple.</p>
      <ul class="gate-features">
        <li>12 core modules with flashcards, quizzes &amp; mini-games</li>
        <li>140+ jargon tooltips in plain English</li>
        <li>Streaks, XP, badges to keep you sharp</li>
        <li>Client toolkit &amp; call-prep builder</li>
      </ul>
      <div class="gate-actions">
        <button class="gate-btn primary" id="gateSignUp">Get started</button>
        <button class="gate-btn" id="gateSignIn">I already have an account</button>
      </div>
      <div class="gate-foot">Secure sign-in by Clerk · Cancel anytime</div>
      <div class="gate-foot-legal">
        <a data-gate-legal="privacy">Privacy</a>·
        <a data-gate-legal="terms">Terms</a>·
        <a data-gate-legal="disclaimer">Disclaimer</a>
      </div>
    `;
    document.getElementById('gateSignUp').onclick = () => this.clerk.openSignUp({ redirectUrl: '/' });
    document.getElementById('gateSignIn').onclick = () => this.clerk.openSignIn({ redirectUrl: '/' });
    this.bindLegalLinks();
  },
  renderPaywall(user) {
    const name = user.firstName || user.emailAddresses[0]?.emailAddress || 'there';
    this.el.innerHTML = `
      <div class="gate-brand">
        <div class="gate-logo">AY</div>
        <div style="text-align:left">
          <div class="gate-name">AYME</div>
          <div class="gate-sub">Unlock full access</div>
        </div>
      </div>
      <h1>Welcome, ${this.escape(name)} 👋</h1>
      <p>Subscribe to unlock all 12 modules, mini-games, and toolkit features.</p>
      <div class="gate-price">$49<small> / month</small></div>
      <ul class="gate-features">
        <li>Full access to every module &amp; mini-game</li>
        <li>Client toolkit &amp; call-prep builder</li>
        <li>Progress tracking, streaks &amp; badges</li>
        <li>Cancel anytime from your billing portal</li>
      </ul>
      <div class="gate-actions">
        <button class="gate-btn primary" id="gateCheckout">Continue to secure checkout</button>
      </div>
      <div class="gate-user">Signed in as <b>${this.escape(user.emailAddresses[0]?.emailAddress || '')}</b> · <button class="signout-link" id="gateSignOut">Sign out</button></div>
      <div class="gate-err" id="gateErr" style="display:none"></div>
      <div class="gate-foot">Payments handled by Stripe · You'll be redirected to a secure checkout page</div>
      <div class="gate-foot-legal">
        <a data-gate-legal="privacy">Privacy</a>·
        <a data-gate-legal="terms">Terms</a>·
        <a data-gate-legal="disclaimer">Disclaimer</a>
      </div>
    `;
    document.getElementById('gateCheckout').onclick = () => this.startCheckout();
    document.getElementById('gateSignOut').onclick = () => this.clerk.signOut();
    this.bindLegalLinks();
  },
  async startCheckout() {
    const btn = document.getElementById('gateCheckout');
    const err = document.getElementById('gateErr');
    btn.disabled = true;
    btn.textContent = 'Redirecting…';
    err.style.display = 'none';
    try {
      const token = await this.clerk.session.getToken();
      const res = await fetch('/api/create-checkout-session', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (!res.ok) throw new Error((await res.json()).error || 'Checkout failed');
      const { url } = await res.json();
      window.location.href = url;
    } catch (e) {
      console.error(e);
      btn.disabled = false;
      btn.textContent = 'Continue to secure checkout';
      err.textContent = e.message;
      err.style.display = 'block';
    }
  },
  async handleCheckoutReturn() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('checkout') === 'success' && this.clerk.user) {
      // Webhook may take a moment — poll briefly for subscription activation
      for (let i = 0; i < 10; i++) {
        await this.clerk.user.reload();
        if (this.clerk.user.publicMetadata?.subscriptionStatus === 'active') break;
        await new Promise(r => setTimeout(r, 1500));
      }
      history.replaceState({}, '', window.location.pathname);
      this.render(this.clerk.user);
    } else if (params.get('checkout') === 'cancel') {
      history.replaceState({}, '', window.location.pathname);
    }
  },
  async openBillingPortal() {
    try {
      const token = await this.clerk.session.getToken();
      const res = await fetch('/api/customer-portal', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (!res.ok) throw new Error('Portal failed');
      const { url } = await res.json();
      window.location.href = url;
    } catch (e) { console.error(e); }
  },
  bindLegalLinks() {
    this.el.querySelectorAll('[data-gate-legal]').forEach(a => {
      a.style.cursor = 'pointer';
      a.onclick = (e) => { e.preventDefault(); this.showLegal(a.dataset.gateLegal); };
    });
  },
  showLegal(slug) {
    const doc = LEGAL_DOCS[slug];
    if (!doc) return;
    this.prevState = this.state;
    this.state = 'legal';
    this.el.className = 'gate-card gate-legal-wrap';
    this.el.innerHTML = `
      <button class="gate-legal-back" id="gateLegalBack">← Back</button>
      <div class="legal-banner">⚠ Starter template — have your own legal counsel review and customise before public launch.</div>
      <h1>${doc.title}</h1>
      <p class="subtitle">Last updated: ${LEGAL_META.lastUpdated}</p>
      <div class="legal-body">${doc.body}</div>
      <div class="legal-footlinks">
        <a data-gate-legal="privacy">Privacy</a>·
        <a data-gate-legal="terms">Terms</a>·
        <a data-gate-legal="disclaimer">Disclaimer</a>
      </div>
    `;
    document.getElementById('gateLegalBack').onclick = () => {
      this.el.className = 'gate-card';
      this.render(this.clerk ? this.clerk.user : null);
    };
    this.bindLegalLinks();
    this.el.querySelectorAll('[data-legal]').forEach(a => {
      a.onclick = (e) => { e.preventDefault(); this.showLegal(a.dataset.legal); };
    });
    this.el.scrollTop = 0;
  },
  renderError(err) {
    document.body.setAttribute('data-auth', 'gate');
    this.el.innerHTML = `
      <div class="gate-brand"><div class="gate-logo">AY</div><div style="text-align:left"><div class="gate-name">AYME</div></div></div>
      <h1>Something went wrong</h1>
      <p>We couldn't load the sign-in system. Please refresh the page.</p>
      <div class="gate-err" style="display:block">${this.escape(err.message || String(err))}</div>
    `;
  },
  escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
};
window.AYME_GATE = GATE;
document.addEventListener('DOMContentLoaded', () => GATE.init());

/* Core engine that finds those terms in rendered text and makes them hoverable */
function explainize(root) {
  if (!root) return;
  const keys = Object.keys(SIMPLE_EXPLANATIONS).sort((a,b) => b.length - a.length);
  if (!keys.length) return;
  const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const src = '(?<!\\w)(' + keys.map(esc).join('|') + ')(?!\\w)';
  const lookup = {};
  keys.forEach(k => { lookup[k.toLowerCase()] = SIMPLE_EXPLANATIONS[k]; });
  const SKIP_TAGS = new Set(['SCRIPT','STYLE','TEXTAREA','INPUT','CODE','BUTTON']);
  const nodes = [];
  (function walk(node) {
    if (node.nodeType === 3) { nodes.push(node); return; }
    if (node.nodeType !== 1) return;
    if (SKIP_TAGS.has(node.tagName)) return;
    if (node.classList && node.classList.contains('tip')) return;
    if (node.classList && node.classList.contains('no-tip')) return;
    for (const c of Array.from(node.childNodes)) walk(c);
  })(root);
  nodes.forEach(node => {
    const text = node.nodeValue;
    if (!text || text.length < 2) return;
    const re = new RegExp(src, 'gi');
    let m, last = 0, found = false;
    const frag = document.createDocumentFragment();
    while ((m = re.exec(text)) !== null) {
      found = true;
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const span = document.createElement('span');
      span.className = 'tip';
      span.setAttribute('tabindex', '0');
      const def = lookup[m[0].toLowerCase()] || '';
      span.setAttribute('data-tip', def);
      span.textContent = m[0];
      frag.appendChild(span);
      last = m.index + m[0].length;
    }
    if (!found) return;
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    if (node.parentNode) node.parentNode.replaceChild(frag, node);
  });
  /* Flip tooltip below if near top edge */
  root.querySelectorAll('.tip').forEach(el => {
    el.addEventListener('mouseenter', () => {
      const r = el.getBoundingClientRect();
      if (r.top < 140) el.classList.add('tip-flip'); else el.classList.remove('tip-flip');
    });
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.tip.tip-show').forEach(x => { if (x !== el) x.classList.remove('tip-show'); });
      el.classList.toggle('tip-show');
    });
  });
}
document.addEventListener('click', (e) => {
  if (!e.target.closest || !e.target.closest('.tip')) {
    document.querySelectorAll('.tip.tip-show').forEach(x => x.classList.remove('tip-show'));
  }
});

/* ============================================================
   AYME — state, persistence, XP
   ============================================================ */

const STORAGE_KEY = "ayme.state.v1";
const RANKS = ["Rookie","Trainee","Apprentice","Graduate","Associate","Specialist","Lead","Principal","Expert","Master"];

const defaultState = () => ({
  xp: 0,
  theme: "dark",
  modules: {}, // id: {flashSeen, quizBest, completed}
  badges: [],
  lastActive: null, // YYYY-MM-DD
  streak: 0,
  quizzesTaken: 0,
  gamesPlayed: 0,
  notes: {}, // module id -> notes
  bookmarks: [], // glossary terms
  onboarded: false // first-run welcome flow completed
});

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  } catch(e) { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

let state = loadState();
if (state.theme) document.body.setAttribute("data-theme", state.theme);

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function daysBetween(a,b){
  if(!a||!b) return Infinity;
  const d1 = new Date(a), d2 = new Date(b);
  return Math.round((d2-d1)/(1000*60*60*24));
}
function tickStreak() {
  const today = todayStr();
  const diff = daysBetween(state.lastActive, today);
  if (diff === 0) return; // same day
  if (diff === 1) state.streak += 1; else state.streak = 1;
  state.lastActive = today;
  saveState();
  if (state.streak >= 3) earnBadge("streak3");
  if (state.streak >= 7) earnBadge("streak7");
}
tickStreak();

function xpForLevel(lvl) { return 100 + (lvl-1) * 50; }
function currentLevel() {
  let lvl = 1, acc = 0;
  while (state.xp >= acc + xpForLevel(lvl)) { acc += xpForLevel(lvl); lvl++; }
  return {lvl, into: state.xp - acc, need: xpForLevel(lvl)};
}
function awardXP(n, reason) {
  state.xp += n;
  saveState();
  toast(`+${n} XP · ${reason}`);
  updateTopbar();
}

function moduleState(id) {
  if (!state.modules[id]) state.modules[id] = {flashSeen:0, quizBest:0, completed:false};
  return state.modules[id];
}
function moduleProgress(id) {
  const ms = moduleState(id);
  const mod = MODULES.find(m => m.id===id);
  const flashTotal = (FLASHCARDS[id] || []).length || 1;
  const quizTotal = (QUIZZES[id] || []).length || 1;
  const flashPct = Math.min(100, (ms.flashSeen / flashTotal) * 100);
  const quizPct = (ms.quizBest / quizTotal) * 100;
  const pct = Math.round((flashPct * 0.4) + (quizPct * 0.6));
  return {pct, flashPct: Math.round(flashPct), quizPct: Math.round(quizPct)};
}
function moduleCompleted(id) {
  const p = moduleProgress(id).pct;
  const ms = moduleState(id);
  const newly = p >= 85 && !ms.completed;
  if (newly) {
    ms.completed = true;
    saveState();
    awardXP(40, `${MODULES.find(m=>m.id===id).name} mastered`);
    checkBadges();
  }
  return p >= 85;
}
function completedCount() {
  return MODULES.filter(m => moduleState(m.id).completed || moduleProgress(m.id).pct >= 85).length;
}

function earnBadge(id) {
  if (state.badges.includes(id)) return;
  state.badges.push(id);
  saveState();
  const b = BADGE_DEFS.find(x => x.id===id);
  if (b) toast(`🏅 Badge unlocked: ${b.name}`);
  updateTopbar();
}
function checkBadges() {
  const c = completedCount();
  if (c >= 1) earnBadge("firstModule");
  if (c >= 3) earnBadge("threeModules");
  if (c === MODULES.length) earnBadge("allModules");
  const mesDone = ["mes","pasx","syncade"].every(id => moduleState(id).completed);
  if (mesDone) earnBadge("allCoreMes");
  const dcsDone = ["deltav","isa88"].every(id => moduleState(id).completed);
  if (dcsDone) earnBadge("dcsMaster");
  const csvDone = ["csv","dataintegrity"].every(id => moduleState(id).completed);
  if (csvDone) earnBadge("csvPro");
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.innerText = msg;
  el.style.display = "block";
  el.className = "toast";
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>{ el.style.display="none"; }, 2600);
}

/* ============================================================
   Topbar & Nav
   ============================================================ */

function updateTopbar() {
  const {lvl, into, need} = currentLevel();
  const rank = RANKS[Math.min(RANKS.length-1, lvl-1)];
  document.getElementById("level").textContent = `Level ${lvl}`;
  document.getElementById("rank").textContent = rank;
  document.getElementById("xp").textContent = into;
  document.getElementById("xpNeeded").textContent = need;
  document.getElementById("xpFill").style.width = Math.min(100, (into/need)*100) + "%";
  document.getElementById("streak").textContent = state.streak;
  document.getElementById("mastered").textContent = completedCount();
  document.getElementById("badgeCount").textContent = state.badges.length;
}

/* Module difficulty tiers — used for the soft-launch learning path */
const MODULE_TIERS = {
  foundation: ["itot", "plc", "mes", "deltav"],
  core: ["isa88", "isa95", "historian", "dataintegrity"],
  advanced: ["syncade", "pasx", "csv", "serialization"],
};
const TIER_META = {
  foundation: { label: "Foundations", emoji: "🟢", blurb: "Start here — the vocabulary and building blocks everyone needs.", unlockAt: 0 },
  core: { label: "Core systems", emoji: "🔵", blurb: "Structural knowledge for confident client conversations.", unlockAt: 2 },
  advanced: { label: "Advanced & vendor-specific", emoji: "🟣", blurb: "Deep dives for senior-level technical and compliance discussions.", unlockAt: 5 },
};
function getTier(id) {
  for (const [tier, ids] of Object.entries(MODULE_TIERS)) if (ids.includes(id)) return tier;
  return "advanced";
}
function tierUnlocked(tier) { return completedCount() >= (TIER_META[tier].unlockAt || 0); }

function renderNav(active) {
  const nav = document.getElementById("nav");
  nav.innerHTML = NAV.map(n =>
    `<div class="nav-item ${n.id===active?'active':''}" data-view="${n.id}">
       <span>${n.icon}</span><span>${n.label}</span>
     </div>`).join("");
  nav.querySelectorAll(".nav-item").forEach(el=>{
    el.addEventListener("click", ()=> navigate(el.dataset.view));
  });
}

let currentView = "dashboard";
function navigate(view, params) {
  currentView = view;
  renderNav(view);
  const v = document.getElementById("view");
  v.innerHTML = "";
  const fn = VIEWS[view] || VIEWS.dashboard;
  fn(v, params || {});
  try { explainize(v); } catch(e) { console.warn("explainize failed", e); }
  window.scrollTo({top:0, behavior:"smooth"});
}

document.getElementById("themeBtn").addEventListener("click", () => {
  const cur = document.body.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.body.setAttribute("data-theme", next);
  state.theme = next;
  saveState();
});

const VIEWS = {};

/* ---------- Dashboard ---------- */
VIEWS.dashboard = (root) => {
  const c = completedCount();
  const overallPct = Math.round(MODULES.reduce((s,m) => s + moduleProgress(m.id).pct, 0) / MODULES.length);
  const foundationDone = MODULE_TIERS.foundation.filter(id => moduleState(id).completed).length;
  // Recommend from lowest unlocked tier first (Foundation → Core → Advanced)
  const tiersByPriority = ["foundation", "core", "advanced"];
  let next = [];
  for (const tier of tiersByPriority) {
    if (!tierUnlocked(tier)) continue;
    const picks = MODULES.filter(m => getTier(m.id) === tier && !moduleState(m.id).completed);
    next = next.concat(picks);
    if (next.length >= 3) break;
  }
  next = next.slice(0, 3);

  if (c === 0 && state.xp === 0) {
    renderBeginnerDashboard(root, next);
  } else if (c < 4) {
    renderGrowingDashboard(root, next, c, foundationDone);
  } else {
    renderFullDashboard(root, next, c, foundationDone, overallPct);
  }
};

      ` : `
        <p class="muted">You've picked your first path — keep going.</p>

  if (alt) rest.forEach(m => alt.appendChild(moduleCardEl(m)));
}

function moduleCardEl(m) {
  const p = moduleProgress(m.id);
  const tier = getTier(m.id);
  const unlocked = tierUnlocked(tier);
  const el = document.createElement("div");
  el.className = "card module-card";
  el.innerHTML = `
    <div class="icon">${m.icon}</div>
    <h3>${m.name}</h3>
    <p class="tiny muted">${m.tagline}</p>
    <div class="progress"><span style="width:${p.pct}%"></span></div>
    <div class="row" style="margin-top:10px;justify-content:space-between">
      <span class="tiny muted">${p.pct}% complete</span>
      <button class="btn small primary">${unlocked ? 'Open' : 'Open anyway'}</button>
    </div>
  `;
  el.addEventListener("click", (e) => {
    if (!unlocked) {
      e.stopPropagation();
      const need = TIER_META[tier].unlockAt - completedCount();
      const ok = confirm(`This module is in the "${TIER_META[tier].label}" tier. We recommend finishing ${need} more Foundation module${need===1?'':'s'} first so this makes sense.\n\nOpen it anyway?`);
      if (!ok) return;
    }
    navigate("module", {id: m.id});
  });
  return el;
}

/* ---------- Modules index ---------- */
VIEWS.modules = (root) => {
  const done = completedCount();
  root.innerHTML = `
    <h1>Modules</h1>
    <p class="subtitle">${MODULES.length} topics across three tiers. Work through Foundations first — the other tiers open up as you go.</p>
    ${Object.keys(MODULE_TIERS).map(tier => {
      const meta = TIER_META[tier];
      const unlocked = tierUnlocked(tier);
      const needs = (meta.unlockAt || 0) - done;
      const tierIds = MODULE_TIERS[tier];
      const tierDone = tierIds.filter(id => moduleState(id).completed).length;
      const statusLabel = unlocked
        ? (tierDone === tierIds.length
            ? `✓ Tier complete`
            : `${tierDone} of ${tierIds.length} done`)
        : `🔒 ${needs} more foundation module${needs===1?'':'s'} to unlock`;
      return `
        <section class="tier ${unlocked ? 'tier-open' : 'tier-locked'}">
          <div class="tier-head">
            <h2>${meta.emoji} ${meta.label}</h2>
            <span class="tier-status ${unlocked ? 'tier-status-open' : 'tier-status-locked'}">${statusLabel}</span>
          </div>
          <p class="tier-blurb">${meta.blurb}</p>
          <div class="grid cols-2 tier-grid" data-tier="${tier}"></div>
        </section>
      `;
    }).join('')}
  `;
  Object.keys(MODULE_TIERS).forEach(tier => {
    const grid = root.querySelector(`[data-tier="${tier}"]`);
    const unlocked = tierUnlocked(tier);
    MODULES.filter(m => getTier(m.id) === tier).forEach(m => {
      const card = moduleCardEl(m);
      if (!unlocked) card.classList.add("card-locked");
      grid.appendChild(card);
    });
  });
};

/* ---------- Single module ---------- */
VIEWS.module = (root, {id}) => {
  const m = MODULES.find(x => x.id===id);
  if (!m) { navigate("modules"); return; }
  const p = moduleProgress(id);
  const ms = moduleState(id);
  root.innerHTML = `
    <button class="btn ghost" id="back">← Back</button>
    <h1 style="margin-top:14px">${m.icon} ${m.name}</h1>
    <p class="subtitle">${m.tagline}</p>

    <div class="tabs" id="modTabs">
      <div class="tab active" data-tab="brief">📋 Briefing</div>
      <div class="tab" data-tab="flash">🃏 Flashcards</div>
      <div class="tab" data-tab="quiz">📝 Quiz</div>

      <div class="tab" data-tab="notes">🗒️ My Notes</div>
    </div>

    <div id="modBody"></div>

    <div style="height:18px"></div>
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div>
          <div class="tiny muted">Module progress</div>
          <div style="font-size:20px;font-weight:700;margin-top:2px">${p.pct}%</div>
        </div>
        <div class="tiny muted">
          Flashcards ${p.flashPct}% · Quiz best ${ms.quizBest}/${(QUIZZES[id]||[]).length}
        </div>
      </div>
      <div class="progress"><span style="width:${p.pct}%"></span></div>
    </div>
  `;
  root.querySelector("#back").addEventListener("click", ()=> navigate("modules"));
  const tabs = root.querySelectorAll("#modTabs .tab");
  const body = root.querySelector("#modBody");
  const showTab = (t) => {
    tabs.forEach(x => x.classList.toggle("active", x.dataset.tab===t));
    if (t==="brief") renderBrief(body, m);
    if (t==="flash") renderFlashcards(body, m);
    if (t==="quiz")  renderQuiz(body, m);
    if (t==="role")  renderRoleCard(body, m);
    if (t==="notes") renderNotes(body, m);
    try { explainize(body); } catch(e) { console.warn("explainize tab failed", e); }
  };
  tabs.forEach(t => t.addEventListener("click", () => showTab(t.dataset.tab)));
  showTab("brief");
};

function levenshtein(a,b) {
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const d = Array.from({length:m+1}, () => new Array(n+1).fill(0));
  for (let i=0;i<=m;i++) d[i][0] = i;
  for (let j=0;j<=n;j++) d[0][j] = j;
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
    const c = a[i-1] === b[j-1] ? 0 : 1;
    d[i][j] = Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+c);
  }
  return d[m][n];
}

function wireCallPrep(body) {
  body.querySelector("#cpClear").addEventListener("click", () => { state.callPrep = {}; saveState(); VIEWS.toolkit(document.getElementById("view")); });
  body.querySelector("#cpBuild").addEventListener("click", () => {
    const data = {
      client: body.querySelector("#cpClient").value.trim(),
      att: body.querySelector("#cpAtt").value.trim(),
      top: body.querySelector("#cpTop").value.trim(),
      stk: body.querySelector("#cpStk").value.trim(),
      out: body.querySelector("#cpOut").value.trim()
    };
    state.callPrep = data; saveState();
    const topics = (data.top||"").split(",").map(s=>s.trim()).filter(Boolean);
    const topicModules = topics.map(t => {
      const hit = MODULES.find(m => (m.name+" "+m.tagline+" "+m.whatItIs).toLowerCase().includes(t.toLowerCase()));
      return hit ? `• ${hit.name}: "${hit.oneLiner}"` : `• ${t}`;
    });
    const openers = shuffle(TOOLKIT.openers).slice(0,3);
    const disc = shuffle(TOOLKIT.discovery).slice(0,3);
    const brief = `
CALL BRIEF — ${data.client || "(client)"}
Attendees: ${data.att || "(tbc)"}
Known stack: ${data.stk || "(unknown)"}

DESIRED OUTCOMES
${(data.out||"(none listed)").split(",").map(s=>`• ${s.trim()}`).join("\n")}

ONE-LINERS FOR THE TOPICS
${topicModules.join("\n") || "• (no topics listed)"}

OPENERS (pick one)
${openers.map(o=>`• ${o}`).join("\n")}

DISCOVERY (ask 2–3)
${disc.map(o=>`• ${o}`).join("\n")}

WATCH-OUTS
${TOOLKIT.pitfalls.slice(0,3).map(p=>`• ${p}`).join("\n")}
`.trim();
    const box = body.querySelector("#cpOutBox");
    box.innerHTML = `
      <hr>
      <h3>📄 Your brief</h3>
      <textarea style="width:100%;min-height:280px;padding:12px;background:var(--panel-2);border:1px solid var(--border);color:var(--text);border-radius:10px;font-family:ui-monospace,Consolas,monospace;font-size:12px">${escapeHtml(brief)}</textarea>
      <div class="row" style="justify-content:flex-end;margin-top:8px">
        <button class="btn" id="cpCopy">📋 Copy</button>
      </div>
    `;
    box.querySelector("#cpCopy").addEventListener("click", () => { navigator.clipboard.writeText(brief); toast("Brief copied"); });
    awardXP(10, "Call prep built");
  });
}

VIEWS.glossary = (root) => {
  root.innerHTML = `
    <h1>Glossary</h1>
    <p class="subtitle">${GLOSSARY.length} terms · Searchable · ⭐ to bookmark</p>
    <input class="search" id="gSearch" placeholder="Search terms — try 'batch', 'historian', 'validation'..." autofocus>
    <div style="height:14px"></div>
    <div id="gList"></div>
  `;
  const list = root.querySelector("#gList");
  const render = (q="") => {
    q = q.trim().toLowerCase();
    const items = GLOSSARY
      .filter(g => !q || g.term.toLowerCase().includes(q) || g.def.toLowerCase().includes(q))
      .sort((a,b) => a.term.localeCompare(b.term));
    if (!items.length) { list.innerHTML = "<p class='muted'>No matches.</p>"; return; }
    list.innerHTML = items.map(g => {
      const starred = state.bookmarks.includes(g.term);
      return `<div class="card" style="padding:14px">
        <div class="row" style="justify-content:space-between">
          <b>${g.term}</b>
          <button class="btn small" data-star="${g.term}">${starred?"★":"☆"}</button>
        </div>
        <p class="tiny" style="margin-top:6px">${g.def}</p>
      </div>`;
    }).join("");
    list.querySelectorAll("[data-star]").forEach(b => {
      b.addEventListener("click", () => {
        const t = b.dataset.star;
        if (state.bookmarks.includes(t)) state.bookmarks = state.bookmarks.filter(x=>x!==t);
        else state.bookmarks.push(t);
        saveState(); render(q);
      });
    });
  };
  root.querySelector("#gSearch").addEventListener("input", e => render(e.target.value));
  render();
};

    if (navigateToPicked && this.picked) navigate('module', { id: this.picked });
  },
  renderStep1(user) {
    const name = user && (user.firstName || (user.emailAddresses && user.emailAddresses[0]?.emailAddress?.split('@')[0])) || 'there';
    this.el.innerHTML = `
      <div class="welcome-step">
        <h1>Welcome, ${this.escape(name)} 👋</h1>

  renderStep2() {
    const foundation = MODULE_TIERS.foundation.map(id => MODULES.find(m => m.id === id));
    this.el.innerHTML = `
      <div class="welcome-step">
        <h1>Pick a starting module</h1>
        <p>We suggest <b>IT/OT</b> — it's the gentlest entry point and ties everything else together. But any of these four is a fine place to start.</p>
        <div class="welcome-modules" id="wMods">
          ${foundation.map(m => `
            <button class="welcome-mod" data-id="${m.id}">
              <div class="wm-icon">${m.icon}</div>
              <div class="wm-name">${m.name}</div>
              <div class="wm-tag">${m.tagline}</div>
            </button>
          `).join('')}
        </div>
        <div class="welcome-dots">
          <div class="welcome-dot"></div>
          <div class="welcome-dot active"></div>
        </div>
        <div class="welcome-actions">
          <button class="welcome-skip" id="wBack">← Back</button>
          <div style="display:flex;gap:10px;align-items:center">
            <button class="welcome-skip" id="wLater">I'll decide later</button>
            <button class="welcome-btn primary" id="wStart" disabled>Start learning →</button>
          </div>
        </div>
      </div>
    `;
    this.el.querySelectorAll('.welcome-mod').forEach(btn => {
      btn.onclick = () => {
        this.picked = btn.dataset.id;
        this.el.querySelectorAll('.welcome-mod').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('wStart').disabled = false;
      };
    });
    document.getElementById('wBack').onclick = () => this.renderStep1(window.Clerk?.user);
    document.getElementById('wStart').onclick = () => this.finish(true);
    document.getElementById('wLater').onclick = () => this.finish(false);
  },
  escape(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); },
};

window.onAymeAuthReady = function(user) {
  updateTopbar();
  navigate("dashboard");
  try {
    const mount = document.getElementById('userButton');
    if (mount && window.Clerk) window.Clerk.mountUserButton(mount, { afterSignOutUrl: '/' });
    const billing = document.getElementById('billingBtn');
    if (billing) billing.onclick = () => window.AYME_GATE.openBillingPortal();
    document.querySelectorAll('[data-legal-sidebar]').forEach(a => {
      a.onclick = (e) => { e.preventDefault(); navigate(a.dataset.legalSidebar); };
    });
  } catch(e) { console.warn('account mount failed', e); }
  // Existing users with any progress shouldn't see the first-run welcome
  if (!state.onboarded && completedCount() === 0 && state.xp === 0 && state.quizzesTaken === 0) {
    setTimeout(() => WELCOME.show(user), 300);
  } else if (!state.onboarded) {
    state.onboarded = true;
    saveState();
  }
};
