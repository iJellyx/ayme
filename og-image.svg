<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1c2850"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#22d3c8"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8aa4ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- decorative gradient orbs -->
  <circle cx="1050" cy="120" r="220" fill="#6c8cff" opacity="0.18"/>
  <circle cx="120" cy="540" r="180" fill="#22d3c8" opacity="0.14"/>
  <!-- logo block -->
  <g transform="translate(80, 220)">
    <rect width="100" height="100" rx="22" fill="url(#logo)"/>
    <text x="50" y="56" text-anchor="middle" dominant-baseline="middle"
          font-family="-apple-system, system-ui, sans-serif"
          font-weight="800" font-size="40" fill="#0b1020">AY</text>
  </g>
  <!-- title -->
  <text x="80" y="400" font-family="-apple-system, system-ui, sans-serif"
        font-weight="800" font-size="78" fill="url(#title)" letter-spacing="-1">AYME</text>
  <text x="80" y="460" font-family="-apple-system, system-ui, sans-serif"
        font-weight="600" font-size="34" fill="#e8ecff">Automation &amp; You Mastery Engine</text>
  <text x="80" y="510" font-family="-apple-system, system-ui, sans-serif"
        font-weight="400" font-size="24" fill="#9aa3c7">Master connected automation in pharma &amp; biotech.</text>
  <text x="80" y="546" font-family="-apple-system, system-ui, sans-serif"
        font-weight="400" font-size="24" fill="#9aa3c7">DeltaV · MES · CSV · IT/OT · Syncade · PAS-X.</text>
  <!-- footer URL -->
  <text x="80" y="595" font-family="-apple-system, system-ui, sans-serif"
        font-weight="500" font-size="20" fill="#6c8cff">aymetraining.com</text>
</svg>
