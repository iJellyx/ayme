<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070A"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C7E8FF" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#9FD4FF" stop-opacity="0.45"/>
      <stop offset="80%" stop-color="#6FBFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#6FBFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambient" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#9FD4FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#9FD4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#ambient)"/>
  <!-- Crosshair mark, large -->
  <g transform="translate(100, 220) scale(1.6)" stroke="#9FD4FF" fill="none">
    <circle cx="32" cy="32" r="20" fill="url(#glow)"/>
    <circle cx="32" cy="32" r="22" stroke-width="0.7" opacity="0.65"/>
    <circle cx="32" cy="32" r="14" stroke-width="0.7" opacity="0.4"/>
    <line x1="32" y1="6" x2="32" y2="58" stroke-width="0.7" opacity="0.5"/>
    <line x1="6" y1="32" x2="58" y2="32" stroke-width="0.7" opacity="0.5"/>
    <circle cx="32" cy="32" r="1.4" fill="#EAF2FF" stroke="none"/>
  </g>
  <!-- Wordmark -->
  <text x="280" y="320" font-family="-apple-system, system-ui, sans-serif"
        font-weight="200" font-size="86" fill="#EAF2FF" letter-spacing="32">AYME</text>
  <text x="280" y="370" font-family="-apple-system, system-ui, sans-serif"
        font-weight="500" font-size="22" fill="#9FD4FF" letter-spacing="6" text-transform="uppercase">PRECISION · INTENTION · CLARITY</text>
  <text x="280" y="430" font-family="-apple-system, system-ui, sans-serif"
        font-weight="400" font-size="22" fill="#8B9BB8">Connected automation training for pharma &amp; biotech.</text>
  <text x="280" y="465" font-family="-apple-system, system-ui, sans-serif"
        font-weight="400" font-size="22" fill="#8B9BB8">DeltaV · MES · CSV · IT/OT · Syncade · PAS-X.</text>
  <!-- Footer URL -->
  <text x="280" y="565" font-family="-apple-system, system-ui, sans-serif"
        font-weight="500" font-size="20" fill="#6FBFFF" letter-spacing="3">aymetraining.com</text>
</svg>
